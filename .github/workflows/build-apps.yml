name: Build apps (Windows + macOS)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish exe (win-x64, self-contained single-file)
        run: dotnet publish windows/app-src/yt2premiere.csproj -c Release -o publish
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: publish/yt2premiere.exe
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: yt2premiere ${{ github.ref_name }}
          files: publish/yt2premiere.exe
          body: |
            Скачивание YouTube для монтажа в Premiere Pro. Собрано на GitHub Actions.

            WINDOWS — скачай **yt2premiere.exe** и запусти (ничего ставить не надо).
            macOS — скачай **yt2premiere-mac-app.zip**, распакуй, перетащи yt2premiere.app в «Программы».
              Первый запуск: правый клик по приложению → «Открыть» (Gatekeeper для неподписанных).

            Оба приложения: окно с очередью, выбор разрешения/формата на каждое видео.
            Инструменты (yt-dlp/ffmpeg) подтягиваются автоматически при первом запуске.

  macos:
    runs-on: macos-latest
    needs: windows          # сериализуем публикацию в один релиз
    steps:
      - uses: actions/checkout@v4
      - name: Build .app (universal: arm64 + x86_64)
        run: bash mac/app-src/build.sh
      - name: Zip .app
        run: ditto -c -k --keepParent mac/yt2premiere.app yt2premiere-mac-app.zip
      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: yt2premiere-mac-app.zip
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: yt2premiere-mac-app.zip
