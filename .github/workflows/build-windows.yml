name: Build Windows EXE

on:
  workflow_dispatch:        # запуск вручную (кнопкой)
  push:
    tags: ['v*']            # запуск при пуше тега vX.Y -> создаёт релиз

permissions:
  contents: write           # нужно для публикации релиза

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (win-x64, self-contained single-file)
        run: dotnet publish windows/app-src/yt2premiere.csproj -c Release -o publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt2premiere-windows-exe
          path: publish/yt2premiere.exe

      - name: Attach exe to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/yt2premiere.exe
          name: yt2premiere ${{ github.ref_name }}
          body: |
            Windows-приложение yt2premiere (собрано на GitHub Actions, Windows runner).

            Скачай **yt2premiere.exe** и запусти — ничего ставить не надо.
            Первый запуск сам докачает yt-dlp и ffmpeg.
            SmartScreen: «Подробнее» -> «Выполнить в любом случае».
